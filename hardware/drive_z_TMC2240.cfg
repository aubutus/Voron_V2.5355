[tmc2240 stepper_z]
cs_pin: PD10
interpolate: True
run_current: 0.6        # 0.8 max : Moteur LDO-42STH40-1684AC(RSS9T)
spi_speed: 500000
spi_software_sclk_pin: PE12
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14
stealthchop_threshold: 0

