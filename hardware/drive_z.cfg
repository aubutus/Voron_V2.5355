#####################################################################
#   Z Stepper Settings
#####################################################################

## In Z-MOT Position
## Z0 Stepper - Front Left
[stepper_z]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
## Z Drive G2ZXL 
rotation_distance: 40
gear_ratio: 9:1
microsteps: 32
# Récup Klippain
full_steps_per_rotation: 200


##  In Z- Position
# endstop_pin: ^PA0   # JD 14/05/2023 : passage au Voron TAP
endstop_pin: probe:z_virtual_endstop

position_min: -10   # initial -5
position_max: 300   #340 initial - changer car porte câble touche le chassie

homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3



##	In E1-MOT Position
##	Z1 Stepper - Rear Left
[stepper_z1]
step_pin: PE6
dir_pin: PC13
enable_pin: !PE5
## Z Drive G2ZXL 
rotation_distance: 40
gear_ratio: 9:1
microsteps: 32

# Récup Klippain
full_steps_per_rotation: 200

##	In E2-MOT Position
##	Z2 Stepper - Rear Right
[stepper_z2]
step_pin: PE2
dir_pin: !PE4
enable_pin: !PE3
## Z Drive G2ZXL 
rotation_distance: 40
gear_ratio: 9:1
microsteps: 32

# Récup Klippain
full_steps_per_rotation: 200

##	In E3-MOT Position
##	Z3 Stepper - Front Right
[stepper_z3]
