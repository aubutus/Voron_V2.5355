[gcode_macro PRINT_START]
description: Démarrage d'impression - Messages clairs et uniformes
gcode:
    {% set BED = params.BED|default(90)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(250)|float %}
    {% set CHAMBER = params.CHAMBER|default(50)|float %}
    {% set MATERIAL = params.MATERIAL|default("UNKNOWN")|string|upper %}
    {% set initial_tool = params.TOOL|default(0)|int %}

    # Désactive le HEATSOAK s'il est lancé
    HEATSOAK_CANCEL

    CLEAR_PAUSE

    # ====================== DÉBUT PRINT_START ======================
    RESPOND TYPE=command MSG="══════════════════════════════════════"
    RESPOND TYPE=command MSG="🚀 DÉBUT PRINT_START - {MATERIAL}"
    RESPOND TYPE=command MSG="══════════════════════════════════════"
    RESPOND TYPE=echo MSG="Matériau : {MATERIAL} | Lit : {BED}°C | Buse : {EXTRUDER}°C | Chambre : {CHAMBER}°C"

    configure_extruder

    # === Heat Soak intelligent ===
    STATUS_HEATING
    {% if MATERIAL in ["ABS", "ASA"] %}
        RESPOND TYPE=command MSG="🔥 Lancement Heat Soak non-bloquant (50 min min si chambre froide)"
        #HEAT_SOAK TARGET={CHAMBER}
    {% else %}
        RESPOND TYPE=echo MSG="Heat soak sauté (matériau non ABS/ASA)"
    {% endif %}

    # === Définit la température du bed sans bloquer (M190 pour attendre) ===
    # --- cela permet de gagner du temps sur la chauffe du plateau durant la phase de préparation
    M140 S{BED}         

    # === Gestion ventilateurs au démarrage ===
    RESPOND TYPE=echo MSG="Configuration ventilateurs pour {MATERIAL}..."
    {% if MATERIAL in ["ABS", "ASA"] %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.75
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.1
        RESPOND TYPE=echo MSG="→ Plateau = 75% | nevermore_fan = 10% (heat soak)"
    {% elif MATERIAL == "PETG" %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.25
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.3
        RESPOND TYPE=echo MSG="→ Plateau = 25% | nevermore_fan = 30%"
    {% elif MATERIAL in ["PLA", "TPU"] %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.0
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.0
        RESPOND TYPE=echo MSG="→ Plateau = OFF | nevermore_fan = OFF"
    {% endif %}

    # === Homing + QGL ===
    RESPOND TYPE=command MSG="🔧 Homing + QGL en cours..."
    G32

    # === Bed Mesh ===
    STATUS_MESHING
    RESPOND TYPE=command MSG="🛠 Calibration Bed Mesh (Adaptive)"
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1
    RESPOND TYPE=echo MSG="Bed Mesh terminé"

    # === Nettoyage buse ===
    RESPOND TYPE=command MSG="🧼 Chauffe buse pour nettoyage ({EXTRUDER}°C)"
    M109 S{EXTRUDER|int}
    CLEAN_NOZZLE

    # === Probing à 150°C ===
    {% set PROBE_TEMP = 150 %}
    RESPOND TYPE=command MSG="📏 Préparation probing TAP ({PROBE_TEMP}°C)"
    {% if EXTRUDER > PROBE_TEMP + 5 %}
        {% set msg = "Refroidir la buse de %.1f°C vers %.1f°C" % (EXTRUDER, PROBE_TEMP) %}
        RESPOND TYPE=echo MSG="{msg}"
        M106 S255
        M109 S{PROBE_TEMP}
        M106 S0
        RESPOND TYPE=echo MSG="Buse refroidie à 150°C pour probing"
    {% else %}
        {% set msg = "réchauffer la buse de %.1f°C vers %.1f°C" % (EXTRUDER, PROBE_TEMP) %}
        RESPOND TYPE=echo MSG="{msg}"
        M109 S{PROBE_TEMP}
        RESPOND TYPE=echo MSG="Buse mise à 150°C pour probing"
    {% endif %}
    # On procède à un nouveau nettoyage de la buse à froid pour éliminer tout résidu éventuel.
    CLEAN_NOZZLE

    # === Z Offset ===
    STATUS_LEVELING
    RESPOND TYPE=command MSG="📐 Calibration Z Offset (Cartographer)"
    CARTOGRAPHER_TOUCH_HOME
    RESPOND TYPE=echo MSG="Z Offset terminé"

    # === Position centre + chauffe plateau ===
    CENTER
    STATUS_HEATING
    RESPOND TYPE=command MSG="🔥 Chauffe plateau à {BED}°C"
    M190 S{BED}

    # === Position centre + chauffe plateau ===
    RESPOND TYPE=command MSG="🔥 Chauffer la buse ({EXTRUDER|int}°c)"
    M109 S{EXTRUDER|int}           ;Définit la température de l'extrudeur et attend qu'elle soit attente

    # Allume tous pour l'impression
    STATUS_PRINTING

    # === Chargement outil ===
    AFC_PARK
    STATUS_CHANGING_TOOLS
    RESPOND TYPE=command MSG="🔄 Chargement outil T{initial_tool}"
    T{initial_tool}

    # === Configuration finale ventilateurs pour impression ===
    RESPOND TYPE=command MSG="⚙ Configuration finale ventilateurs"
    {% if MATERIAL in ["ABS", "ASA"] %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.30
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.65
        RESPOND TYPE=echo MSG="→ ABS/ASA : Plateau = 30% | nevermore_fan = 65%"
    {% elif MATERIAL == "PETG" %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.25
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.4
        RESPOND TYPE=echo MSG="→ PETG : Plateau = 25% | nevermore_fan = 40%"
    {% elif MATERIAL in ["PLA", "TPU"] %}
        SET_FAN_SPEED FAN=Plateau SPEED=0.0
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.0
        RESPOND TYPE=echo MSG="→ {MATERIAL} : Tous ventilateurs OFF"
    {% endif %}

    # Resolution temporaire d'un problème avec ce capteur
    SET_FILAMENT_SENSOR SENSOR=tool_end ENABLE=0

    # ====================== FIN PRINT_START ======================
    STATUS_PRINTING
    RESPOND TYPE=command MSG="✅ PRINT_START TERMINÉ - Lancement de l'impression"
    RESPOND TYPE=command MSG="══════════════════════════════════════"
    M117 Impression {MATERIAL} en cours...