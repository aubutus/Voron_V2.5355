[gcode_macro M141]
description: Set Chamber Temperature
gcode:


[gcode_macro M191]
description: Wait for chamber temperature
gcode:
    {% set target = params.S|default(50)|float %}
    {% set current = printer['temperature_sensor chamber2'].temperature|float %}
    
    {% if current >= target %}
        {% set msg = "Chambre déjà a %.1f°C" % current %}
        RESPOND TYPE=echo MSG="{msg}"
    {% else %}
        {% set msg = "Chambre a %.1f°C au lieu de %.1f°C" % (current, target) %}
        RESPOND TYPE=echo MSG="{msg}"
    {% endif %}
     HEAT_SOAK TARGET={target}



[gcode_macro HEAT_SOAK]
description: Heat soak intelligent avec 50 min minimum (moins bloquant)
gcode:
    {% set target = params.TARGET|default(50)|float %}
    {% set current = printer['temperature_sensor chamber2'].temperature|float %}

    {% set msg = "=== HEAT SOAK → Chambre actuelle : %.1f°C | Cible : %.1f°C ===" % (current, target) %}
    RESPOND TYPE=echo MSG="{msg}"

    {% if current >= 45 %}
        RESPOND TYPE=command MSG="=== CHAMBRE DÉJÀ CHAUDE → Soak sauté ==="
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0.65
        SET_FAN_SPEED FAN=Plateau SPEED=0.3
        return
    {% endif %}

    # Phase 1 : Configuration pour heat soak
    RESPOND TYPE=command MSG="=== Début Heat Soak (chambre froide) ==="
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.1
    SET_FAN_SPEED FAN=Plateau SPEED=1.0

    # Attente de la température (moins bloquante que G4)
    # TEMPERATURE_WAIT SENSOR="temperature_sensor chamber2" MINIMUM={target - 2}

    RESPOND TYPE=command MSG="=== Température chambre atteinte → Soak minimum 50 minutes ==="

    # Ici on peut faire des actions "légères" pendant le soak minimum
    # Exemple : bouger doucement la tête pour uniformiser la chaleur
    G90
    G0 X175 Y175 Z50 F3000     ; Position centrale haute (adapte à ta 350mm)

    # Soak minimum de 50 minutes (encore bloquant, mais après la température atteinte)
    # G4 P3000000

    # Phase finale
    RESPOND TYPE=command MSG="=== HEAT SOAK TERMINÉ (50 min) → Passage en impression ==="
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.65
    SET_FAN_SPEED FAN=Plateau SPEED=0.3