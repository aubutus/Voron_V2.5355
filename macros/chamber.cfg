[gcode_macro M141]
description: Set Chamber Temperature
gcode:
    # /-----------------------------------------------------------------------\
    # |  Il n'y a pas de chauffage actif de la chambre                        |
    # |  Il est gérè directement dans le print start via la macro HEAT_SOAK   |
    # \-----------------------------------------------------------------------/


[gcode_macro M191]
description: Wait for chamber temperature
gcode:
    # /-----------------------------------------------------------------------\
    # |  Il n'y a pas de chauffage actif de la chambre                        |
    # |  Il est gérè directement dans le print start via la macro HEAT_SOAK   |
    # \-----------------------------------------------------------------------/


# =============================================
# HEAT SOAK TOTALEMENT NON-BLOQUANT 
# 50 minutes démarrent APRÈS avoir atteint la température
# =============================================
[gcode_macro HEAT_SOAK]
description: Heat soak non-bloquant - 50 min après température atteinte
variable_target_temp: 50.0
variable_soak_active: False
variable_soak_phase: "idle"          ; idle / heating / soaking
variable_soak_start_time: 0.0
variable_elapsed_time: 0
gcode:
    {% set target = params.TARGET|default(50)|float %}

    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=target_temp VALUE={target}
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_active VALUE=True
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_phase VALUE="'heating'"
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=elapsed_time VALUE=0
    UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=1

    RESPOND TYPE=command MSG="══════════════════════════════════════"
    RESPOND TYPE=command MSG="🔥 HEAT SOAK NON-BLOQUANT DÉMARRÉ"
    RESPOND TYPE=command MSG="Phase 1 → Attente température {target}°C"
    RESPOND TYPE=command MSG="══════════════════════════════════════"

    # Configuration initiale
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.1
    SET_FAN_SPEED FAN=Plateau SPEED=1.0

    # Lancement de la surveillance
    UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=10


# Boucle de surveillance (toutes les 10 secondes)
[delayed_gcode HEAT_SOAK_MONITOR]
gcode:
    {% set soak = printer['gcode_macro HEAT_SOAK'] %}
    {% if not soak.soak_active %}
        UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=0
        return
    {% endif %}

    {% set target = soak.target_temp|float %}
    {% set current = printer['temperature_sensor chamber2'].temperature|float %}
    {% set phase = soak.soak_phase|string %}
    {% set elapsed = soak.elapsed_time|int %}
    {% set stable = soak.stable_time|int %}

    # === Sécurité capteur ===
    {% if current < 0 or current > 120 %}
        RESPOND TYPE=error MSG="❌ ERREUR SONDE CHAMBRE"
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_active VALUE=False
        return
    {% endif %}

    # === Gestion stabilité thermique ===
    {% if current >= (target - 1) and current <= (target + 1) %}
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stable_time VALUE={stable + 10}
    {% else %}
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stable_time VALUE=0
    {% endif %}

    # === Affichage (toutes les 30s) ===
    {% if (elapsed % 30) < 10 %}
        {% set remaining = (3000 - elapsed) // 60 %}
        RESPOND TYPE=echo MSG="HeatSoak | {phase} | { '%.1f'|format(current) }/{target}°C | ⏱ {elapsed//60}m | ETA {remaining}m"
    {% endif %}


    # === Phase 1 : chauffe + stabilisation, attente d'atteindre la température ===
     {% if phase == "heating" %}
        {% if stable >= 120 %}
            RESPOND TYPE=command MSG="🌡️ Température STABLE atteinte !"
            RESPOND TYPE=command MSG="⏳ Lancement soak 50 min"

            SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_phase VALUE="'soaking'"
            SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=elapsed_time VALUE=0
        {% endif %}
    {% endif %}

    # === Phase 2 : Soak de 50 minutes = 3000 ===
    {% if phase == "soaking" %}
        # Pause si température chute
        {% if current < (target - 3) %}
            RESPOND TYPE=command MSG="⚠️ Température chutée → pause timer"
        {% else %}
            SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=elapsed_time VALUE={elapsed + 10}
        {% endif %}

        {% if elapsed >= 3000 %}
            RESPOND TYPE=command MSG="✅ HEAT SOAK TERMINÉ"
            RESPOND TYPE=command MSG="══════════════════════════════════════"

            SET_FAN_SPEED FAN=nevermore_fan SPEED=0.65
            SET_FAN_SPEED FAN=Plateau SPEED=0.3

            SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_active VALUE=False
            SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_phase VALUE="'idle'"
            UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=0
            return
        {% endif %}
    {% endif %}


    # === Relance dans 10 secondes ===
    UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=10


[gcode_macro HEATSOAK_CANCEL]
description: Annule le heat soak
gcode:
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_active VALUE=False
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_phase VALUE="'idle'"
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=elapsed_time VALUE=0
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stable_time VALUE=0

    UPDATE_DELAYED_GCODE ID=HEAT_SOAK_MONITOR DURATION=0

    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.65
    SET_FAN_SPEED FAN=Plateau SPEED=0.3

    RESPOND TYPE=command MSG="❌ Heat Soak annulé"